<div id="auth-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#f9f9f9; z-index:99999; justify-content:center; align-items:center;">
  <form id="auth-form" style="width:100%; max-width:400px; padding:30px; background:#fff; border-radius:8px; box-shadow:0 0 20px rgba(0,0,0,0.1);" onsubmit="return checkPassword()">
    <input type="password" id="auth-password" placeholder="请输入口令" required style="width:calc(100% - 30px); padding:15px; margin-top:10px; border-radius:4px; border:1px solid #ddd; font-size:16px;" />
    <input type="submit" value="提交" style="background-color:#007bff; color:#fff; border:none; cursor:pointer; width:calc(100% - 30px); padding:15px; margin-top:10px; border-radius:4px; font-size:16px;" />
  </form>
</div>
